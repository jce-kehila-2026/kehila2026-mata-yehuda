# Render deployment — 3 services
# https://render.com/docs/blueprint-spec

services:
  # ── 1. Payment API (server/server.js) ──────────────────────────
  - type: web
    name: matayehuda-payment-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm run start:payment
    healthCheckPath: /activities
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: FIREBASE_PROJECT_ID
        value: matayehuda
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_BASE_URL
        value: https://api-m.sandbox.paypal.com
      - key: FRONTEND_URL
        sync: false
      - key: STAFF_PIN
        sync: false

  # ── 2. Notifications API (server/index.js) ─────────────────────
  - type: web
    name: matayehuda-notifications-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: FIREBASE_PROJECT_ID
        value: matayehuda
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: FCM_TOKEN_STALE_DAYS
        value: "90"

  # ── 3. Frontend (src/ → dist/) ───────────────────────────────
  - type: web
    name: matayehuda-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: VITE_API_BASE
        sync: false
      - key: VITE_NOTIFICATIONS_API_URL
        sync: false
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: matayehuda.firebaseapp.com
      - key: VITE_FIREBASE_PROJECT_ID
        value: matayehuda
      - key: VITE_FIREBASE_STORAGE_BUCKET
        value: matayehuda.firebasestorage.app
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        value: "264845791661"
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_VAPID_KEY
        sync: false
